<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plan my day</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  :root{
    /* Signal OS light tokens */
    --paper:#FCFCFA;
    --panel:#FFFFFF;
    --panel2:#FCFCFA;
    --ink:#16181B;
    --ink2:#3A3F46;
    --ink3:#4B5563;
    --muted:#6B7280;
    --faint:#9CA3AF;

    --line:#E7E5E0;
    --line2:#F0EEE9;
    --line-strong:#D6D3CD;

    /* Coral: the single accent */
    --ember:#E8543F;
    --ember-2:#D64934;
    --ember-ink:#B23A28;
    --ember-soft:rgba(232,84,63,.07);
    --ember-line:rgba(232,84,63,.3);

    --positive:#0E7D5E;
    --positive-line:rgba(14,125,94,.32);
    --negative:#B42318;

    --grotesk:"Space Grotesk","Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
    --mono:"Space Mono","Cascadia Mono",Consolas,"SF Mono",Menlo,monospace;

    --shadow-md:0 8px 28px rgba(22,24,27,.1);

    --r-sm:3px; --r-md:4px; --r-lg:5px;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.004em;
  }
  ::selection{background:var(--ember-soft)}

  button{
    font:inherit;cursor:pointer;
    border:1px solid var(--line-strong);
    background:var(--panel);color:var(--ink);
    border-radius:var(--r-md);
    padding:6px 11px;height:28px;
    font-weight:500;font-size:12.5px;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
    transition:background .12s,border-color .12s,color .12s;
  }
  button:hover{border-color:var(--ink);color:var(--ink)}
  button:active{background:var(--line2)}
  .mono{font-family:var(--mono)}

  /* ---------- suite nav (Signal OS shell contract, verbatim) ---------- */
.sos-nav{position:sticky;top:0;z-index:80;height:42px;display:flex;align-items:center;gap:28px;padding:0 20px;background:#FCFCFA;border-bottom:1px solid #E7E5E0;font-family:"Space Mono","Cascadia Mono",Consolas,monospace}
.sos-brand{font-size:11px;font-weight:700;letter-spacing:.24em;color:#16181B;text-decoration:none}
.sos-links{display:flex;gap:24px;margin-left:auto}
.sos-links a,.sos-links span{font-size:10.5px;font-weight:400;letter-spacing:.16em;color:#6B7280;text-decoration:none;line-height:42px}
.sos-links a:hover{color:#16181B}
.sos-links [aria-current="page"]{color:#16181B;font-weight:700;border-bottom:2px solid #16181B}

  /* ---------- view header (uniform shell row) ---------- */
  header{
    height:48px;display:flex;align-items:center;gap:10px;
    padding:0 20px;border-bottom:1px solid var(--line);
    background:var(--paper);
    position:relative;z-index:30;
  }
  .vh-left{display:flex;align-items:baseline;gap:12px;min-width:0}
  .vh-name{font:400 11px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink);white-space:nowrap}
  .vh-scope{font:400 13px/1.4 var(--grotesk);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spacer{flex:1}
  .stamp{font:400 10px/1 var(--mono);color:var(--muted);white-space:nowrap;letter-spacing:.04em}
  .linkbtn{
    border:none;background:transparent;padding:0;height:auto;border-radius:0;
    font:400 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted);
    text-decoration:underline;text-underline-offset:3px;
  }
  .linkbtn:hover{color:var(--ink);background:transparent;border:none}

  /* ---------- page body ---------- */
  main{max-width:760px;margin:0 auto;padding:26px 20px 64px}
  .sec{margin:0 0 30px}
  .sec-head{
    display:flex;align-items:baseline;gap:12px;
    padding:0 0 9px;border-bottom:1px solid var(--line);
  }
  .sec-label{font:700 10px/1 var(--mono);letter-spacing:.18em;color:var(--ink)}
  .sec-date{font:400 10px/1 var(--mono);letter-spacing:.06em;color:var(--muted)}
  p.quiet{margin:10px 0 0;font-size:12.5px;line-height:1.55;color:var(--muted)}

  /* act-on-first rows */
  .act-row{display:flex;gap:12px;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--line2)}
  .act-row:last-of-type{border-bottom:none}
  .act-num{font:700 11px/1 var(--mono);color:var(--ember-ink);min-width:20px;flex:none}
  .act-txt{flex:1;font-size:13px;line-height:1.5;color:var(--ink2);min-width:0}
  .act-side{flex:none;display:flex;align-items:baseline;gap:10px}
  .act-link{
    font:400 9.5px/1 var(--mono);letter-spacing:.12em;color:var(--muted);
    text-decoration:underline;text-underline-offset:3px;white-space:nowrap;
  }
  .act-link:hover{color:var(--ink)}
  .src-stamp{font:400 9.5px/1 var(--mono);letter-spacing:.04em;color:var(--muted);white-space:nowrap}
  .tag-sample{
    font:400 8.5px/1 var(--mono);letter-spacing:.12em;color:var(--muted);
    border:1px solid var(--line-strong);border-radius:var(--r-sm);
    padding:2px 4px;white-space:nowrap;
  }

  /* meetings rows */
  .mt-row{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line2);text-decoration:none;color:inherit}
  .mt-row:last-of-type{border-bottom:none}
  .mt-row:hover .mt-title{color:var(--ink)}
  .mt-when{font:700 9px/1.4 var(--mono);letter-spacing:.1em;color:var(--ink3);min-width:104px;flex:none;text-transform:uppercase}
  .mt-when.today{color:var(--ember-ink)}
  .mt-when.held{color:var(--muted);font-weight:400}
  .mt-title{flex:1;font-size:13px;line-height:1.45;color:var(--ink2);min-width:0}
  .mt-kind{color:var(--muted)}
  .mt-open{font:400 10px/1.4 var(--mono);letter-spacing:.06em;color:var(--ember-ink);white-space:nowrap}
  .mt-open.clear{color:var(--muted)}

  /* week-so-far lines */
  .wk p{margin:9px 0 0;font-size:12.5px;line-height:1.55;color:var(--ink2)}
  .wk p.quiet{color:var(--muted)}
  .wk-lab{font:700 9px/1 var(--mono);letter-spacing:.14em;color:var(--ember-ink);margin-right:8px;text-transform:uppercase}
</style>
</head>
<body>

<nav class="sos-nav">
  <a class="sos-brand" href="../">SIGNAL OS</a>
  <div class="sos-links">
    <a href="../radar/">RADAR</a>
    <a href="../associate-os/">ASSOCIATE OS</a>
    <span aria-current="page">BRIEF</span>
  </div>
</nav>

<header>
  <div class="vh-left">
    <span class="vh-name">Plan my day</span>
    <span class="vh-scope">what to act on first, meetings ahead, the week so far</span>
  </div>
  <div class="spacer"></div>
  <span class="stamp" id="genStamp"></span>
  <button class="linkbtn" id="regenBtn" type="button">regenerate</button>
</header>

<main>
  <section class="sec">
    <div class="sec-head"><span class="sec-label">ACT ON FIRST</span><span class="sec-date" id="actDate"></span></div>
    <div id="actBody"></div>
  </section>
  <section class="sec">
    <div class="sec-head"><span class="sec-label">MEETINGS AHEAD</span><span class="sec-date" id="meetDate"></span></div>
    <div id="meetBody"></div>
  </section>
  <section class="sec">
    <div class="sec-head"><span class="sec-label">THE WEEK SO FAR</span><span class="sec-date" id="weekDate"></span></div>
    <div class="wk" id="weekBody"></div>
  </section>
</main>

<script>
"use strict";
/* Plan my day. Composed client-side, read-only, from the same-origin
   localStorage the four views already write. The only key this page writes
   is its own per-day cache, sos.planmyday.v1. No network calls. */

/* ---------- small helpers ---------- */
var WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function pad2(n){ return (n < 10 ? "0" : "") + n; }
function keyOf(d){ return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function todayKey(){ return keyOf(new Date()); }
function pdKey(key){
  var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(key || "");
  return m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date();
}
function addDaysKey(key, n){ var d = pdKey(key); d.setDate(d.getDate() + n); return keyOf(d); }
function daysBetween(aKey, bKey){ return Math.round((pdKey(bKey) - pdKey(aKey)) / 86400000); } /* b - a */
function keyLabel(key){
  var d = pdKey(key);
  return WD[d.getDay()] + " " + d.getDate() + " " + MON[d.getMonth()];
}
function hhmm(ts){ var d = new Date(ts); return pad2(d.getHours()) + ":" + pad2(d.getMinutes()); }
function startOfToday(){ var d = new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function weekStart(){ return startOfToday() - 6 * 86400000; }
function weekStartKey(){ return keyOf(new Date(weekStart())); }
function esc(s){
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function pl(n, one, many){ return n + " " + (n === 1 ? one : many); }
function listNames(arr, max){
  var names = arr.slice(0, max).map(function(s){ return esc(s); });
  var extra = arr.length - names.length;
  return names.join(", ") + (extra > 0 ? " and " + pl(extra, "more", "more") : "");
}
function lsGet(k){
  try{ var v = JSON.parse(localStorage.getItem(k)); return v == null ? null : v; }catch(e){ return null; }
}
function lsSet(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

/* The three sourcing views merged into one Radar page; names stay as
   provenance labels, links go to the merged view. */
var VIEW = {
  fr: { name: "Founder Radar", href: "../radar/" },
  gs: { name: "Growth Scout", href: "../radar/" },
  br: { name: "Breakout Radar", href: "../radar/" },
  ao: { name: "Associate OS", href: "../associate-os/" }
};

/* ---------- readers: one per store, every field guarded ---------- */

/* founder_radar_v2: statuses, outreach drafts, live people (Show HN + watched
   X follows), the HN pull stamp, and the scored-queue feed line. */
function readFounder(){
  var raw = lsGet("founder_radar_v2");
  if (!raw || typeof raw !== "object" || !raw.statuses) return null;
  var t = todayKey();
  var o = { draftsReady: 0, inboxReal: [], joinedToday: 0, hnStamp: null,
            liveTotal: 0, queue: null, likely: null,
            outreach: 0, watchlist: 0, meetings: 0, ignored: 0 };
  var st = (raw.statuses && typeof raw.statuses === "object") ? raw.statuses : {};
  function statusOf(id){ return st[id] || "inbox"; }
  for (var k in st){
    if (st[k] === "contacted") o.outreach++;
    else if (st[k] === "watchlist") o.watchlist++;
    else if (st[k] === "meeting") o.meetings++;
    else if (st[k] === "ignored") o.ignored++;
  }
  /* drafts written but not yet queued for outreach */
  var seenDraft = {};
  [raw.drafts, raw.aiDrafts].forEach(function(bag){
    if (!bag || typeof bag !== "object") return;
    for (var id in bag){
      if (seenDraft[id]) continue;
      seenDraft[id] = 1;
      var s = statusOf(id);
      if (s === "inbox" || s === "watchlist") o.draftsReady++;
    }
  });
  /* real people (live pulls) still sitting in the inbox */
  var real = [];
  if (Array.isArray(raw.hn)) real = real.concat(raw.hn);
  if (Array.isArray(raw.xf)) real = real.concat(raw.xf);
  o.liveTotal = real.length;
  real.forEach(function(c){
    if (!c || !c.name) return;
    if (statusOf(c.id) !== "inbox") return;
    o.inboxReal.push(String(c.name));
    if (c.pull && c.pull.date === t) o.joinedToday++;
  });
  if (raw.hnPull && raw.hnPull.date === t && raw.hnPull.time) o.hnStamp = "HN " + raw.hnPull.time;
  if (Array.isArray(raw.feed)){
    for (var j = raw.feed.length - 1; j >= 0; j--){
      var f = raw.feed[j];
      var ms = (f && typeof f.msg === "string") ? f.msg.match(/Scored <b>(\d+) profiles<\/b>; (\d+) are likely/) : null;
      if (ms){ o.queue = +ms[1]; o.likely = +ms[2]; break; }
    }
  }
  return o;
}

/* growthScout.*: the daily snapshot (top movers, discoveries, stars) plus
   signal recency for the week summary. */
function readScout(){
  var snap = lsGet("growthScout.dailySnapshot.v1");
  var stars = lsGet("growthScout.starred.v1");
  var sig = lsGet("growthScout.signals.v1");
  if (!snap && stars == null && !sig) return null;
  var o = { stars: Array.isArray(stars) ? stars.length : 0,
            snapDate: null, topMover: null, leader: null, discovered: 0, sigWeek: 0 };
  if (snap && typeof snap === "object"){
    o.snapDate = (typeof snap.date === "string") ? snap.date : null;
    if (typeof snap.starredCount === "number") o.stars = snap.starredCount;
    if (Array.isArray(snap.newDiscoveries)) o.discovered = snap.newDiscoveries.length;
    if (Array.isArray(snap.topMovers) && snap.topMovers.length){
      var moved = snap.topMovers.filter(function(m){ return m && m.name && (+m.delta || 0) !== 0; });
      if (moved.length) o.topMover = { name: String(moved[0].name), delta: +moved[0].delta, score: +moved[0].score || 0 };
      var first = snap.topMovers[0];
      if (first && first.name) o.leader = { name: String(first.name), score: +first.score || 0 };
    }
  }
  if (sig && typeof sig === "object"){
    var ws = weekStart(), seen = {};
    ["jobs","hn","gh","x"].forEach(function(b){
      var bk = sig[b];
      if (!bk || typeof bk !== "object") return;
      for (var id in bk){
        var v = bk[id];
        if (v && typeof v.at === "number" && v.at >= ws) seen[id] = true;
      }
    });
    o.sigWeek = Object.keys(seen).length;
  }
  return o;
}

/* breakout.dailySnapshot.v1 (risers, new breakouts, flags) plus br_watch. */
function readBreakout(){
  var snap = lsGet("breakout.dailySnapshot.v1");
  var watch = lsGet("br_watch");
  if (!snap && !Array.isArray(watch)) return null;
  var o = { watch: Array.isArray(watch) ? watch.length : null,
            snapDate: null, riser: null, newBreakouts: [], flagged: [] };
  if (snap && typeof snap === "object"){
    o.snapDate = (typeof snap.date === "string") ? snap.date : null;
    if (Array.isArray(snap.topRisers) && snap.topRisers.length && snap.topRisers[0] && snap.topRisers[0].name){
      o.riser = { name: String(snap.topRisers[0].name),
                  delta: +snap.topRisers[0].delta || 0,
                  index: +snap.topRisers[0].index || 0 };
    }
    if (Array.isArray(snap.newBreakouts)) o.newBreakouts = snap.newBreakouts.filter(Boolean).map(String);
    if (Array.isArray(snap.flaggedToday)) o.flagged = snap.flaggedToday.filter(Boolean).map(String);
  }
  return o;
}

/* aos_v1 raw state (commitments and meetings carry real ISO dates),
   aos.dailySnapshot.v1 as the coarse fallback. */
function readAos(){
  var raw = lsGet("aos_v1");
  var snap = lsGet("aos.dailySnapshot.v1");
  if (!raw && !snap) return null;
  return { raw: (raw && typeof raw === "object") ? raw : null,
           snap: (snap && typeof snap === "object") ? snap : null };
}
function aosCommitments(ao){
  return (ao && ao.raw && Array.isArray(ao.raw.commitments)) ? ao.raw.commitments : null;
}
function aosMeetings(ao){
  return (ao && ao.raw && Array.isArray(ao.raw.meetings)) ? ao.raw.meetings : null;
}
function commitmentOpen(c, t){
  if (!c || c.status === "done") return false;
  if (typeof c.snoozeUntil === "string" && c.snoozeUntil > t) return false;
  return true;
}
function aosOverdue(ao){
  var cs = aosCommitments(ao), t = todayKey();
  if (!cs) return null;
  return cs.filter(function(c){
    return commitmentOpen(c, t) && typeof c.due === "string" && c.due && c.due < t;
  }).sort(function(a, b){ return a.due < b.due ? -1 : a.due > b.due ? 1 : 0; });
}
/* pending drafted emails: draft or nudge activity tied to a still-open commitment */
function aosDraftsPending(ao){
  if (!ao || !ao.raw || !Array.isArray(ao.raw.activity)) return null;
  var cs = aosCommitments(ao) || [];
  var t = todayKey(), byId = {};
  cs.forEach(function(c){ if (c && c.id) byId[c.id] = c; });
  var seen = {}, n = 0;
  ao.raw.activity.forEach(function(a){
    if (!a || (a.kind !== "draft" && a.kind !== "nudge")) return;
    var cId = a.ref && a.ref.cId;
    if (!cId || seen[cId]) return;
    seen[cId] = 1;
    if (byId[cId] && commitmentOpen(byId[cId], t)) n++;
  });
  return n;
}
function sampleCommitment(c){ return !!(c && typeof c.id === "string" && /^c\d+$/.test(c.id)); }
function sampleMeeting(m){ return !!(m && typeof m.id === "string" && /^m\d+$/.test(m.id) && !m.granola); }

/* sos.pipeline.v1: the shared workflow store all four views write. */
function readPipe(){
  var v = lsGet("sos.pipeline.v1");
  if (!Array.isArray(v)) return null;
  return v.filter(function(e){ return e && typeof e === "object" && e.name; });
}

/* ---------- ACT ON FIRST ---------- */

function actItems(fr, gs, br, ao, pipe){
  var items = [], t = todayKey();

  /* 1. overdue commitments, most overdue first */
  var over = aosOverdue(ao);
  if (over && over.length){
    over.slice(0, 3).forEach(function(c){
      var late = daysBetween(c.due, t);
      var text = esc(c.text || "commitment");
      var s = (c.who === "mine")
        ? "Clear your overdue commitment: " + text + ", " + pl(late, "day", "days") + " late."
        : "Chase " + esc(c.owner || "them") + " for " + text + ", " + pl(late, "day", "days") + " late.";
      items.push({ txt: s, view: "ao", sample: sampleCommitment(c) });
    });
    if (over.length > 3){
      items.push({ txt: pl(over.length - 3, "more commitment is", "more commitments are") + " overdue in Associate OS.", view: "ao" });
    }
  } else if (!over && ao && ao.snap && typeof ao.snap.overdueCommitments === "number" && ao.snap.overdueCommitments > 0){
    items.push({ txt: pl(ao.snap.overdueCommitments, "commitment is", "commitments are") + " overdue in Associate OS.", view: "ao" });
  }

  /* 2. drafts ready to send */
  if (fr && fr.draftsReady > 0){
    items.push({ txt: pl(fr.draftsReady, "outreach draft is", "outreach drafts are") + " written and ready to send in Founder Radar.", view: "fr" });
  }
  var aoDrafts = aosDraftsPending(ao);
  if (aoDrafts != null && aoDrafts > 0){
    items.push({ txt: pl(aoDrafts, "drafted email is", "drafted emails are") + " waiting on your send in Associate OS.", view: "ao" });
  }

  /* 3. new real people in the queue */
  if (fr && fr.inboxReal.length){
    var s = pl(fr.inboxReal.length, "real person is", "real people are") + " waiting in the Founder Radar queue";
    if (fr.joinedToday) s += ", " + fr.joinedToday + " joined today";
    s += ": " + listNames(fr.inboxReal, 2) + ".";
    items.push({ txt: s, view: "fr", stamp: fr.hnStamp });
  }

  /* 4. pipeline entries parked at Outreach or Meeting */
  if (pipe && pipe.length){
    var outreach = pipe.filter(function(e){ return e.stage === "Outreach"; });
    var meeting = pipe.filter(function(e){ return e.stage === "Meeting"; });
    if (outreach.length){
      items.push({ txt: listNames(outreach.map(function(e){ return e.name; }), 3) +
        (outreach.length === 1 ? " is" : " are") + " sitting at Outreach in the pipeline, follow up or move on.", view: "ao" });
    }
    if (meeting.length){
      items.push({ txt: listNames(meeting.map(function(e){ return e.name; }), 3) +
        (meeting.length === 1 ? " is" : " are") + " at Meeting stage in the pipeline, prep or log the outcome.", view: "ao" });
    }
  }

  /* 5. top movers */
  if (gs && (gs.topMover || gs.leader)){
    var asOf = (gs.snapDate && gs.snapDate !== t) ? ", as of " + keyLabel(gs.snapDate) : "";
    if (gs.topMover){
      var d = gs.topMover.delta;
      items.push({ txt: esc(gs.topMover.name) + " moved " + (d > 0 ? "+" : "") + d + " to " + gs.topMover.score + " on the Growth Scout board" + asOf + ".", view: "gs" });
    } else {
      items.push({ txt: esc(gs.leader.name) + " leads the Growth Scout board at " + gs.leader.score + asOf + ".", view: "gs" });
    }
  }
  if (br && (br.newBreakouts.length || br.riser)){
    var asOf2 = (br.snapDate && br.snapDate !== t) ? ", as of " + keyLabel(br.snapDate) : "";
    if (br.newBreakouts.length){
      items.push({ txt: listNames(br.newBreakouts, 2) + " crossed the breakout line in Breakout Radar" + asOf2 + ".", view: "br" });
    } else {
      items.push({ txt: esc(br.riser.name) + " rose +" + br.riser.delta + " to index " + br.riser.index + " in Breakout Radar" + asOf2 + ".", view: "br" });
    }
  }

  return items.slice(0, 7);
}

function renderActRow(it, i){
  var v = VIEW[it.view];
  return '<div class="act-row">' +
    '<span class="act-num">' + pad2(i + 1) + '</span>' +
    '<span class="act-txt">' + it.txt + '</span>' +
    '<span class="act-side">' +
      (it.stamp ? '<span class="src-stamp">' + esc(it.stamp) + '</span>' : '') +
      (it.sample ? '<span class="tag-sample">SAMPLE</span>' : '') +
      '<a class="act-link" href="' + v.href + '">' + v.name.toUpperCase() + '</a>' +
    '</span></div>';
}

function quietLine(text){ return '<p class="quiet">' + text + '</p>'; }

function buildAct(fr, gs, br, ao, pipe){
  var items = actItems(fr, gs, br, ao, pipe);
  var html = items.map(renderActRow).join("");
  if (!items.length) html += quietLine("Nothing to act on yet. Open the views and the queue will build itself.");
  /* empty stores degrade to plain nothing-yet lines */
  if (!fr) html += quietLine("Nothing yet from Founder Radar.");
  if (!gs) html += quietLine("Nothing yet from Growth Scout.");
  if (!br) html += quietLine("Nothing yet from Breakout Radar.");
  if (!ao) html += quietLine("Nothing yet from Associate OS.");
  if (!pipe || !pipe.length) html += quietLine("Nothing yet from the shared pipeline.");
  return html;
}

/* ---------- MEETINGS AHEAD ---------- */

var TYPE_LABEL = { intro: "founder intro", portfolio: "portfolio check-in", diligence: "diligence call",
                   lp: "LP sync", partner: "partner sync", imported: "granola import" };

function openCountOf(ao, mId){
  var cs = aosCommitments(ao) || [], t = todayKey(), n = 0;
  cs.forEach(function(c){ if (c && c.meetingId === mId && commitmentOpen(c, t)) n++; });
  return n;
}

function meetRow(when, whenCls, m, openN, sample){
  var kind = TYPE_LABEL[m.type] || "";
  var title = String(m.title || m.company || "Meeting");
  if (kind && title.toLowerCase().indexOf(kind.toLowerCase()) >= 0) kind = "";
  return '<a class="mt-row" href="../associate-os/">' +
    '<span class="mt-when' + (whenCls ? " " + whenCls : "") + '">' + esc(when) + '</span>' +
    '<span class="mt-title">' + esc(title) +
      (kind ? ' <span class="mt-kind">' + esc(kind) + '</span>' : '') + '</span>' +
    (sample ? '<span class="tag-sample">SAMPLE</span>' : '') +
    '<span class="mt-open' + (openN ? '' : ' clear') + '">' + (openN ? openN + " OPEN" : "ALL CLEAR") + '</span>' +
  '</a>';
}

function buildMeet(ao){
  if (!ao) return quietLine("Nothing yet from Associate OS.");
  var ms = aosMeetings(ao);
  if (!ms){
    var held = ao.snap && typeof ao.snap.meetingsThisWeek === "number" ? ao.snap.meetingsThisWeek : null;
    return quietLine(held != null
      ? "No meeting detail stored, the last snapshot counted " + pl(held, "meeting", "meetings") + " this week."
      : "Nothing yet from Associate OS.");
  }
  var t = todayKey(), horizon = addDaysKey(t, 6), ws = weekStartKey();
  var ahead = [], held = [];
  ms.forEach(function(m){
    if (!m || typeof m.date !== "string") return;
    if (m.date >= t && m.date <= horizon) ahead.push(m);
    else if (m.date < t && m.date >= ws && openCountOf(ao, m.id) > 0) held.push(m);
  });
  ahead.sort(function(a, b){ return a.date < b.date ? -1 : 1; });
  held.sort(function(a, b){ return a.date > b.date ? -1 : 1; });
  var html = "";
  ahead.forEach(function(m){
    var when = m.date === t ? "TODAY" : (m.date === addDaysKey(t, 1) ? "TOMORROW" : keyLabel(m.date));
    html += meetRow(when, m.date === t ? "today" : "", m, openCountOf(ao, m.id), sampleMeeting(m));
  });
  if (!ahead.length) html += quietLine("No meetings on the calendar for the week ahead.");
  if (held.length){
    held.slice(0, 5).forEach(function(m){
      html += meetRow("HELD " + keyLabel(m.date), "held", m, openCountOf(ao, m.id), sampleMeeting(m));
    });
  }
  return html;
}

/* ---------- THE WEEK SO FAR ---------- */

function wkLine(label, text){ return '<p><span class="wk-lab">' + label + '</span>' + text + '</p>'; }
function wkQuiet(label, name){ return '<p class="quiet"><span class="wk-lab">' + label + '</span>Nothing yet from ' + name + '.</p>'; }

function buildWeek(fr, gs, br, ao, pipe){
  var html = "", t = todayKey();

  if (fr){
    var parts = [];
    if (fr.queue != null) parts.push(fr.queue + " in the queue" + (fr.likely != null ? ", " + fr.likely + " likely" : ""));
    if (fr.liveTotal) parts.push(pl(fr.liveTotal, "live person", "live people") + " in from Show HN and watched follows");
    var moves = [];
    if (fr.outreach) moves.push(fr.outreach + " queued for outreach");
    if (fr.watchlist) moves.push(fr.watchlist + " on the watchlist");
    if (fr.meetings) moves.push(pl(fr.meetings, "meeting", "meetings") + " set");
    if (fr.ignored) moves.push(fr.ignored + " ignored");
    if (moves.length) parts.push(moves.join(", "));
    html += parts.length ? wkLine("FOUNDER RADAR", parts.join(". ") + ".")
                         : wkLine("FOUNDER RADAR", "Open, no stored activity yet.");
  } else html += wkQuiet("FOUNDER RADAR", "Founder Radar");

  if (gs){
    var gp = [];
    gp.push(gs.stars === 0 ? "no companies starred yet" : pl(gs.stars, "company", "companies") + " starred");
    if (gs.discovered) gp.push(pl(gs.discovered, "company", "companies") + " discovered");
    if (gs.sigWeek) gp.push("signals refreshed for " + gs.sigWeek + " this week");
    var s0 = gp.join(", ") + ".";
    html += wkLine("GROWTH SCOUT", s0.charAt(0).toUpperCase() + s0.slice(1));
  } else html += wkQuiet("GROWTH SCOUT", "Growth Scout");

  if (br){
    var bp = [];
    if (br.watch != null) bp.push(br.watch === 0 ? "watchlist is empty" : pl(br.watch, "company", "companies") + " on the watchlist");
    if (br.snapDate === t && br.newBreakouts.length) bp.push("new breakouts: " + listNames(br.newBreakouts, 3));
    if (br.snapDate === t && br.flagged.length) bp.push("flagged for partner review: " + listNames(br.flagged, 3));
    if (!bp.length) bp.push(br.snapDate ? "last snapshot " + keyLabel(br.snapDate) : "no snapshot yet");
    var s1 = bp.map(function(x){ return x.charAt(0).toUpperCase() + x.slice(1); }).join(". ") + ".";
    html += wkLine("BREAKOUT RADAR", s1);
  } else html += wkQuiet("BREAKOUT RADAR", "Breakout Radar");

  if (ao){
    var cs = aosCommitments(ao), ms = aosMeetings(ao);
    var ap = [], ws = weekStartKey();
    if (ms){
      var heldN = 0;
      ms.forEach(function(m){ if (m && typeof m.date === "string" && m.date >= ws && m.date <= t) heldN++; });
      ap.push(pl(heldN, "meeting", "meetings") + " held");
    }
    if (cs){
      var done7 = 0, open = 0, overN = 0;
      cs.forEach(function(c){
        if (!c) return;
        if (c.status === "done"){ if (typeof c.doneOn === "string" && c.doneOn >= ws && c.doneOn <= t) done7++; return; }
        if (!commitmentOpen(c, t)) return;
        open++;
        if (typeof c.due === "string" && c.due && c.due < t) overN++;
      });
      ap.push(pl(done7, "commitment", "commitments") + " closed");
      ap.push(open + " open of which " + overN + " overdue");
    } else if (ao.snap){
      if (typeof ao.snap.meetingsThisWeek === "number") ap.push(pl(ao.snap.meetingsThisWeek, "meeting", "meetings") + " held");
      if (typeof ao.snap.openCommitments === "number") ap.push(ao.snap.openCommitments + " open of which " + (ao.snap.overdueCommitments || 0) + " overdue");
    }
    html += ap.length ? wkLine("ASSOCIATE OS", ap.join(", ") + ".")
                      : wkLine("ASSOCIATE OS", "Open, no stored activity yet.");
  } else html += wkQuiet("ASSOCIATE OS", "Associate OS");

  if (pipe && pipe.length){
    var wsMs = weekStart();
    var weekly = pipe.filter(function(e){ return typeof e.at === "number" && e.at >= wsMs; });
    var pp = [];
    if (weekly.length){
      var byFrom = {};
      weekly.forEach(function(e){
        var n = { "founder-radar": "Founder Radar", "growth-scout": "Growth Scout",
                  "breakout-radar": "Breakout Radar", "associate-os": "Associate OS" }[e.from] || "elsewhere";
        byFrom[n] = (byFrom[n] || 0) + 1;
      });
      pp.push(pl(weekly.length, "entry", "entries") + " added this week (" +
        Object.keys(byFrom).map(function(k){ return byFrom[k] + " from " + k; }).join(", ") + ")");
    } else {
      pp.push("nothing added this week");
    }
    var order = ["Sourced","Outreach","Meeting","Diligence","Passed"], counts = {};
    pipe.forEach(function(e){
      var s = (typeof e.stage === "string" && e.stage) ? e.stage : "Sourced";
      counts[s] = (counts[s] || 0) + 1;
    });
    var keys = Object.keys(counts).sort(function(a, b){
      var ia = order.indexOf(a), ib = order.indexOf(b);
      return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
    });
    pp.push(pl(pipe.length, "entry", "entries") + " tracked in total: " +
      keys.map(function(k){ return counts[k] + " " + esc(k.toLowerCase()); }).join(", "));
    var s2 = pp.join(". ") + ".";
    html += wkLine("PIPELINE", s2.charAt(0).toUpperCase() + s2.slice(1));
  } else html += wkQuiet("PIPELINE", "the shared pipeline");

  return html;
}

/* ---------- compose, cache per day, render ---------- */

function compose(){
  var fr = readFounder(), gs = readScout(), br = readBreakout(), ao = readAos(), pipe = readPipe();
  return {
    date: todayKey(),
    at: Date.now(),
    act: buildAct(fr, gs, br, ao, pipe),
    meet: buildMeet(ao),
    week: buildWeek(fr, gs, br, ao, pipe)
  };
}

var CACHE_KEY = "sos.planmyday.v1";
function render(b){
  document.getElementById("actBody").innerHTML = b.act;
  document.getElementById("meetBody").innerHTML = b.meet;
  document.getElementById("weekBody").innerHTML = b.week;
  document.getElementById("actDate").textContent = keyLabel(b.date);
  document.getElementById("meetDate").textContent = keyLabel(b.date) + " to " + keyLabel(addDaysKey(b.date, 6));
  document.getElementById("weekDate").textContent = keyLabel(weekStartKey()) + " to " + keyLabel(b.date);
  var atK = keyOf(new Date(b.at || Date.now()));
  document.getElementById("genStamp").textContent =
    "PLANNED " + (atK === todayKey() ? hhmm(b.at || Date.now()) : keyLabel(atK).toUpperCase());
}
function ensurePlan(force){
  if (!force){
    var c = lsGet(CACHE_KEY);
    if (c && c.date === todayKey() && typeof c.act === "string" &&
        typeof c.meet === "string" && typeof c.week === "string"){
      render(c);
      return;
    }
  }
  var b = compose();
  lsSet(CACHE_KEY, b);
  render(b);
}
document.getElementById("regenBtn").addEventListener("click", function(){ ensurePlan(true); });
ensurePlan(false);
</script>
